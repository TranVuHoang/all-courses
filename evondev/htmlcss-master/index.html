<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML CSS Master</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <div class="tour">
      <div class="tour-top">
        <img src="./images/img1.png" alt="this-is-image-1" class="tour-image" />
        <span class="tour-price">From $40</span>
      </div>
      <div class="tour-content">
        <h3 class="tour-title">
          Thailands Ayutthaya Temples Cruise from Bangkok
        </h3>
        <div class="tour-rating">
          <div class="tour-review">
            <div class="tour-star">
              <img
                src="./images/star.png"
                alt="tour-rating-star"
                class="img-star"
              />
            </div>
            <div class="tour-review-count">
              <span>4.8 (12 reviews)</span>
            </div>
          </div>
          <span class="tour-duration">Duration: 9 hours</span>
        </div>
        <a
          href="#Tours-Price-$61"
          target="_blank"
          class="tour-button"
          rel="noopenner noreferrer"
          >Tours Price $61</a
        >
      </div>
    </div>
    
  </body>
</html>
