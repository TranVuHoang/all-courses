<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Đây là thẻ heading 1 -->
    <h1>Đây là tiêu đề 1</h1>
    <h2>Cà phê muối</h2>

    <!-- thẻ đoạn văn p -->
    <p>
      <strong>Lorem ipsum</strong> dolor sit amet consectetur adipisicing elit.
      Magni aperiam nemo, <em>delectus iure</em> aut provident fuga unde sequi
      et, sed enim saepe nobis facilis nulla.
      <span>Numquam odit</span> excepturi vitae quam?
    </p>
  </body>
</html>
