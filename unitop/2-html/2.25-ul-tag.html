<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thẻ danh sánh không thứ tự ul</title>
  </head>
  <body>
    <h1>Danh sách không thứ tự</h1>
    <ul>
      <li>
        List item 1
        <ul>
          <li>
            List item 1.1
            <ul>
              <li>List item 1.1.1</li>
              <li>List item 1.1.2</li>
            </ul>
          </li>
          <li>List item 1.2</li>
        </ul>
      </li>
      <li>2</li>
      <li>3</li>
      <li>4</li>
    </ul>
  </body>
</html>
