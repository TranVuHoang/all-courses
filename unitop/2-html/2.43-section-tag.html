<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2.43 - section tag</title>
  </head>
  <body>
    <!-- section tag dùng để định nghĩa một phần nội dung trong một trang web, thường được sử dụng để nhóm các phần nội dung liên quan lại với nhau. Section tag giúp cải thiện khả năng truy cập và cấu trúc của trang web, đồng thời cung cấp một cách rõ ràng để xác định các phần nội dung cho người dùng và công cụ tìm kiếm. -->
    <section class="section-1">
      <h2>Section Title</h2>
      <ul>
        <li><img src="" alt="" /></li>
        <li>Item 2</li>
        <li>Item 3</li>
      </ul>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod
        tempor incididunt ut labore et dolore magna aliqua.
      </p>
    </section>
  </body>
</html>
