<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2.42 - article tag</title>
  </head>
  <body>
    <!-- article tag dùng để định nghĩa một phần nội dung độc lập trong một trang web, thường được sử dụng để chứa các bài viết, tin tức, hoặc bất kỳ loại nội dung nào có thể tồn tại độc lập. Article tag giúp cải thiện khả năng truy cập và cấu trúc của trang web, đồng thời cung cấp một cách rõ ràng để xác định các phần nội dung cho người dùng và công cụ tìm kiếm. -->
    <article>
      <h2>Article Title</h2>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod
        tempor incididunt ut labore et dolore magna aliqua.
      </p>
    </article>
  </body>
</html>
