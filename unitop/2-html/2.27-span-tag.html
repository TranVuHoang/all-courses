<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thẻ span - thẻ biểu diễn thông tin phụ</title>
  </head>
  <body>
    <style>
      .num-comment,
      .price {
        color: red;
      }
    </style>
    <h1>Thẻ span trong html</h1>
    <p><span class="price">Giá: 500.000đ</span></p>
    <p>Comment: <span class="num-comment">5</span></p>
  </body>
</html>
