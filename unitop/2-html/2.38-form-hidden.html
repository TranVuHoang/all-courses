<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input hidden</title>
  </head>
  <body>
    <h1>Input hidden</h1>
    <form action="">
      <label for="username">Username:</label><br />
      <input
        type="text"
        id="username"
        name="username"
        placeholder="username"
      /><br /><br />
      <label for="password">Password:</label><br />
      <input
        type="password"
        id="password"
        name="password"
        placeholder="password"
      />
      <input type="hidden" name="redirect" value="http://unitop.vn" />
    </form>
  </body>
</html>
