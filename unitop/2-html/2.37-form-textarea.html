<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form nhập liệu đoạn văn - textarea</title>
  </head>
  <body>
    <h1>Form nhập liệu đoạn văn bản</h1>
    <form action="">
      <label for="post">Chi tiết bài viết</label><br /><br />
      <!-- Lưu chi tiết bài  -->
      <textarea name="post" id="post" cols="60" rows="10"></textarea>
    </form>
  </body>
</html>
