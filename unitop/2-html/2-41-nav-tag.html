<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2.41 - Nav Tag</title>
  </head>
  <body>
    <!-- nav tag dùng để định nghĩa một phần của trang web có chứa các liên kết điều hướng. Nó thường được sử dụng để tạo menu điều hướng hoặc thanh điều hướng trên trang web. Nav tag giúp cải thiện khả năng truy cập và cấu trúc của trang web, đồng thời cung cấp một cách rõ ràng để xác định các liên kết điều hướng cho người dùng và công cụ tìm kiếm. -->
    <nav>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#services">Services</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </body>
</html>
