<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thẻ u i u</title>
  </head>
  <body>
    <!-- thẻ in đậm nội dung b -->
    <b>In đậm nội dung</b> <br />

    <!-- Thẻ in đậm nội dung strong -->
    <strong>Iin đậm nội dung bằng thẻ strong</strong><br />

    <!-- thẻ in nghiêng i  -->
    <i>In nghiêng nội dung với thẻ i</i><br />

    <!-- Thẻ in nghiên em  -->
    <em>In nghiêng nội dung bằng thẻ em</em> <br />

    <!-- Thẻ gạch chân u  -->
    <u>Gạch chân nội dung với thẻ u</u><br />

    <!-- Thẻ gạch ngang del -->
     <del>16.000.000</del>VND    
  </body>
</html>
