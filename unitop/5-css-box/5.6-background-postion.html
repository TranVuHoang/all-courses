<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>5.6 background position</title>
    <style>
      .wrapper {
        width: 1200px;
        margin: 0 auto;
      }
      .box {
        min-height: 300px;
        background-color: #fffece;
        border-radius: 10px;
        background-image: url("https://picsum.photos/200/200");
        background-size: 50px;
        background-repeat: no-repeat;
        /* background-size: cover; */
        object-fit: cover;
        background-position: center top;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <h1>5.6 background position</h1>
      <div class="box"></div>
    </div>
  </body>
</html>
