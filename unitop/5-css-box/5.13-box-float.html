<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box float</title>
    <style>
      #wrapper {
        width: 700px;
        margin: 0 auto;
      }
      .text-center {
        text-align: center;
      }
      .box-1 {
        width: 300px;
        height: 200px;
        background: greenyellow;
        float: left;
      }
      .box-2 {
        width: 400px;
        height: 200px;
        background: gray;
        float: left;
      }
    </style>
  </head>
  <body>
    <hr />
    <div id="wrapper">
      <h1>Box float</h1>
      <div class="box-1 text-center">Box-1</div>
      <div class="box-2 text-center">Box-2</div>
    </div>
  </body>
</html>
