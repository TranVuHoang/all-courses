<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>display inline block</title>
    <style>
      .link-gr a {
        display: inline-block;
        cursor: pointer;
        color: #000;
        padding: 10px 20px;
        background: aquamarine;
        text-decoration: none;
        border-radius: 30px;
      }
      .link-gr a:hover {
        background: #7fffd496;
        transition: 0.5s eases;
        color: #ff0000;
      }
    </style>
  </head>
  <body>
    <h1>display inline block</h1>
    <div class="link-gr">
      <a href="#">link 1</a>
      <a href="#">link 2</a>
      <a href="#">link 3</a>
      <a href="#">link 4</a>
    </div>
  </body>
</html>
