<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài tập thực hành số 6</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .container {
        width: 960px;
        margin: 0 auto;
      }
      .header {
        background: #26cafc;
        padding: 15px;
        color: #fff;
        text-align: center;
      }
      .main {
        min-height: 1000px;
        display: flex;
      }
      .content {
        width: 60%;
        background: silver;
        padding: 10px;
      }
      .sidebar {
        width: 40%;
        background: gray;
        padding: 10px;
      }

      .footer {
        background: #26cafc;
        padding: 15px;
        color: #fff;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">Header</header>
      <main class="main">
        <div class="content">Content</div>
        <div class="sidebar">Sidebar</div>
      </main>
      <footer class="footer">Footer</footer>
    </div>
  </body>
</html>
