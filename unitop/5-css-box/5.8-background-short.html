<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>5.8 background rút gọn</title>
    <style>
      .wrapper {
        width: 1200px;
        margin: 0 auto;
      }
      .box {
        min-height: 300px;
        background-color: #fffece;
        padding: 10px;
        border-radius: 10px;
        /* background-size: cover; */
        object-fit: cover;
        background-size: 10px;
        background: #fffece url("https://picsum.photos/700/200") no-repeat
          center;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <h1>5.8 background rút gọn</h1>
      <div class="box"></div>
    </div>
  </body>
</html>
