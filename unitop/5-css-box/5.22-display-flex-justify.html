<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>display flex - Justify content</title>
  </head>
  <style>
    .container {
      width: 1170px;
      margin: 0 auto;
      display: flex;
      background: gray;
      /* flex-direction: row-reverse; */
      /* align-items: center; */
      justify-content: center;
      flex-wrap: wrap;
      /* justify-content: start; */
      /* justify-content: space-around; */
      justify-content: space-between;
    }
    .box {
      width: 100px;
      padding: 40px;
      font-size: 18px;
      background: greenyellow;
      margin: 10px;
      text-align: center;
    }
  </style>
  <body>
    <h1>display flex Justify content</h1>
    <hr />
    <div class="container">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
      <div class="box">6</div>
      <div class="box">7</div>
      <div class="box">8</div>
      <div class="box">9</div>
      <div class="box">10</div>
      <div class="box">11</div>
      <div class="box">12</div>
    </div>
  </body>
</html>
