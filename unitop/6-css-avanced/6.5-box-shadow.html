<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6.5 box shadow</title>
    <style>
      .box {
        width: 400px;
        height: 400px;
        line-height: 400px;
        margin-left: 50px;
        background: hotpink pink;
        text-align: center;

        /* đổ bóng box: */
        box-shadow: 0 0 10px 5px #e991af;
      }
    </style>
  </head>
  <body>
    <h1>6.5 Box shadow</h1>
    <p>
      Tác dụng: <br />
      Thiết lập hiệu ứng đổ bóng cho khối.
    </p>
    <hr />
    <div class="box">Box</div>
  </body>
</html>
