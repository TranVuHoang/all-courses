<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6.2 - Transition</title>
    <style>
      .box {
        width: 200px;
        padding: 50px;
        background: tomato;
        text-align: center;
        text-transform: uppercase;
        transition: 0.5s ease;
        cursor: pointer;
      }
      .box:hover {
        width: 300px;
        background: #69edd9;
        transition: 0.5s ease;
      }
    </style>
  </head>
  <body>
    <h1>6.2 Transition</h1>
    <p>
      Tác dụng: <br />
      Giúp làm chậm quá trình thay đổi giá trị thuộc tính của một đối tượng html
    </p>
    <hr />
    <div class="box">Box</div>
  </body>
</html>
