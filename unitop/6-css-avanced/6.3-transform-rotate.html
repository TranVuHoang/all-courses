<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6.3 Transform rotate</title>
    <style>
      .box {
        height: 100px;
        width: 200px;
        padding: 50px;
        background: tomato;
        text-align: center;
        text-transform: uppercase;
        margin-left: 50px;
        transition: 0.5s ease;
        cursor: pointer;
      }
      .box:hover {
        transform: rotate(360deg);
        transition: all 0.5s ease;
      }
    </style>
  </head>
  <body>
    <h1>Transform: rotate</h1>
    <p>
      Tác dụng: <br />
      Giúp xoay phần tử với một góc cho trước.
    </p>
    <hr />
    <div class="box">Box</div>
  </body>
</html>
