<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Element selector</title>
    <style>
      h1 {
        color: red;
        font-size: 40px;
      }
      p {
        font-style: italic;
        font-size: 16px;
        color: green;
      }
    </style>
  </head>
  <body>
    <h1>Đây là thẻ tiêu đề h1</h1>
    <p>
      Lorem ipsum dolor sit amet, consectetur adipisicing elit. Sed magnam
      recusandae tenetur dolorum blanditiis ad quae assumenda magni ipsa
      doloremque?
    </p>
  </body>
</html>
