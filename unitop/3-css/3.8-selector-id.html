<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Id selector</title>
    <style>
      #container {
        width: 960px;
        margin: 0 auto;
      }
      .header {
        text-align: center;
        background: #333;
        color: white;
      }
      .content {
        min-height: 500px;
      }
      .footer {
        background: #000;
        color: white;
      }
      .text-center {
        text-align: center;
      }
      .text-red {
        color: red;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>Cách sử dụng CSS id</h1>
      <div class="header">
        <h2>Header</h2>
      </div>
      <div class="content">
        <h2>content</h2>
      </div>
      <div class="footer text-center text-red">
        <h2>footer</h2>
      </div>
    </div>
  </body>
</html>
