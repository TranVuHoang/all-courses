<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 02</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      #main {
        display: table;
      }
      .left,
      .content,
      .right {
        height: 200px;
        display: inline-block;
      }
      .left {
        background: yellow;
        width: 200px;
      }
      .content {
        background: red;
        width: 500px;
      }
      .right {
        background: green;
        width: 300px;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="left">Left</div>
      <div class="content">Content</div>
      <div class="right">Right</div>
    </div>
  </body>
</html>
