<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 01</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .block {
        width: 500px;
        height: 300px;
        border: 3px solid #000;
        margin: 20px auto;
      }
      .block-group {
        letter-spacing: normal;
        word-spacing: 15px;
        text-align: justify;

        /* Thụt lề dòng đầu tiên của đọan văn */
        text-indent: 20px;

        white-space: pre;
        /* display: none; */
      }
    </style>
  </head>
  <body>
    <div class="block block-group">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Doloribus magni
      cupiditate vero iure ducimus molestias consectetur, libero illum deserunt
      tempora facere excepturi a! Quis soluta fugit sapiente minima est
      distinctio.
    </div>
  </body>
</html>
