<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 01</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .block {
        width: 500px;
        height: 300px;
        margin: 20px auto;
      }
      .border {
        /* border: 1px solid #000; */
        border-top: 1px dotted darkblue;
        border-right: medium dotted rgb(2, 2, 17);
        border-bottom: thick double rgb(2, 2, 17);
        border-left: 5px solid rgb(2, 2, 17);
      }
    </style>
  </head>
  <body>
    <div class="block border">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Doloribus magni
      cupiditate vero iure ducimus molestias consectetur, libero illum deserunt
      tempora facere excepturi a! Quis soluta fugit sapiente minima est
      distinctio.
    </div>
  </body>
</html>
