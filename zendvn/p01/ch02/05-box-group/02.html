<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .group-box {
        width: 960px;
        margin: 0 auto;
        /* display: flex; */
      }
      .gr-box-top {
        display: flex;
      }
      .box {
        width: 200px;
        height: 200px;
        color: #000;
        background: red;
        text-align: center;
        line-height: 200px;
      }
      .box-b {
        background: aqua;
      }
      .box-c {
        background: orange;
        margin-left: auto;
      }
      .box-d {
        background: rgb(83, 123, 83);
        height: 200px;
        text-align: center;
        line-height: 200px;
      }
    </style>
  </head>
  <body>
    <div class="group-box">
      <div class="gr-box-top">
        <div class="box box-a">Box-A</div>
        <div class="box box-b">Box-B</div>
        <div class="box box-c">Box-C</div>
      </div>
      <div class="box-d">Box-D</div>
    </div>
  </body>
</html>
