<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example 01</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .block {
        width: 800px;
        margin: 20px auto;
        height: 250px;
        border: 2px solid red;
      }
      .menu {
        list-style-position: outside;
        list-style-type: decimal;
      }
    </style>
  </head>
  <body>
    <div class="block">
      <ul class="menu">
        <li>Home</li>
        <li>About</li>
        <li>Product</li>
        <li>Specials</li>
        <li>Contact</li>
      </ul>
    </div>
  </body>
</html>
